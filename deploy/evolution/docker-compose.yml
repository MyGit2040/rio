# Evolution API — self-hosted WhatsApp engine for Eagle.
# A complete, working stack: the API + Postgres (data) + Redis (cache).
# Evolution API v2 needs a database, so all three run together.
#
# Usage on your Webuzo VPS:
#   1. Put this file + the .env file in the same directory.
#   2. Edit .env: set SERVER_URL to your public IP, keep the keys.
#   3. docker compose up -d
#
# All persistent data lives in named volumes, so a server restart never
# deletes your linked WhatsApp sessions.

services:
  evolution-api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:latest
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Name shown under WhatsApp → Linked devices. Overrides the default
      # "Evolution API". CLIENT is the app name in parentheses; NAME is the browser.
      # These win over anything in .env. Re-link a device for the new name to apply.
      CONFIG_SESSION_PHONE_CLIENT: "Eag"
      CONFIG_SESSION_PHONE_NAME: "Chrome"
    volumes:
      - evolution_instances:/evolution/instances   # linked WhatsApp sessions persist here
    networks:
      - evolution-net

  postgres:
    container_name: evolution_postgres
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - evolution-net

  redis:
    container_name: evolution_redis
    image: redis:7
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis:/data
    networks:
      - evolution-net

volumes:
  evolution_instances:
  postgres_data:
  evolution_redis:

networks:
  evolution-net:
    driver: bridge
